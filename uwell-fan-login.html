<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>UWELL · Fan Club</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif;background:#0a0a0f;color:#fff;overflow-x:hidden;min-height:100vh;width:100vw}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}#pc{z-index:1}#gc{z-index:2;pointer-events:none}
.st{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;animation:tw 4s ease-in-out infinite alternate}
.st::after{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background-image:radial-gradient(1px 1px at 10% 20%,rgba(255,255,255,0.4),transparent),radial-gradient(1px 1px at 30% 50%,rgba(255,255,255,0.3),transparent),radial-gradient(1.5px 1.5px at 50% 10%,rgba(255,255,255,0.5),transparent),radial-gradient(1px 1px at 70% 30%,rgba(255,255,255,0.3),transparent),radial-gradient(1px 1px at 90% 60%,rgba(255,255,255,0.4),transparent),radial-gradient(1.5px 1.5px at 15% 80%,rgba(255,255,255,0.3),transparent);background-size:200px 200px}
@keyframes tw{0%{opacity:0.3}100%{opacity:1}}
.am{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;overflow:hidden}
.am>div{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.12;animation:of 8s ease-in-out infinite alternate}
.am>div:nth-child(1){width:400px;height:400px;background:radial-gradient(circle,#ff6b35,#e63946);top:-10%;left:-5%;animation-duration:10s}
.am>div:nth-child(2){width:350px;height:350px;background:radial-gradient(circle,#457bff,#6c5ce7);top:40%;right:-8%;animation-duration:12s;animation-delay:-3s}
.am>div:nth-child(3){width:300px;height:300px;background:radial-gradient(circle,#00d2ff,#00b894);bottom:15%;left:20%;animation-duration:9s;animation-delay:-5s}
@keyframes of{0%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-20px) scale(1.1)}100%{transform:translate(-20px,15px) scale(0.9)}}
.bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background:radial-gradient(ellipse at 50% 0%,#1a1a2e 0%,#0a0a0f 60%,#000 100%)}
.gl{position:fixed;top:0;left:0;width:100%;height:100%;z-index:3;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.02) 2px,rgba(0,0,0,0.02) 4px)}
.pz{position:fixed;bottom:0;left:0;width:100%;height:20vh;z-index:8;pointer-events:none;overflow:hidden}
.hd{width:100%;padding:20px 40px;display:flex;justify-content:space-between;align-items:center;position:absolute;top:0;z-index:30}
.hd .lg{display:flex;align-items:center;gap:12px}
.hd .lg .lt{font-size:24px;font-weight:bold;letter-spacing:2px;background:linear-gradient(135deg,#fff 30%,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hd nav{display:flex;gap:30px}
.hd nav a{color:rgba(255,255,255,0.6);text-decoration:none;font-size:13px;font-weight:bold;letter-spacing:1px;cursor:pointer;transition:color .3s}
.hd nav a:hover{color:#ff6b35}
.main-wrap{position:relative;z-index:20;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 20px 140px}
.lw{width:400px;max-width:100%}
.lc{background:rgba(255,255,255,0.05);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:40px 35px;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.bar{width:60px;height:3px;background:linear-gradient(90deg,#ff6b35,#457bff);border-radius:2px;margin:0 auto 20px}
.lt{text-align:center;margin-bottom:30px}
.lt h1{font-size:28px;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#fff,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lt p{color:rgba(255,255,255,0.4);font-size:12px;margin-top:6px;letter-spacing:1px}
.fg{margin-bottom:18px;position:relative}
.fg label{display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.fg input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:#fff;font-size:14px;outline:none;transition:all .3s}
.fg input:focus{border-color:#ff6b35;background:rgba(255,107,53,0.08)}
.fg input::placeholder{color:rgba(255,255,255,0.2)}
.fo{display:flex;justify-content:space-between;align-items:center;margin:20px 0}
.fo label{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,0.35);font-size:12px;cursor:pointer}
.fo a{color:rgba(255,255,255,0.35);font-size:12px;text-decoration:none;cursor:pointer}
.fo a:hover{color:#ff6b35}
.btn{width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,#ff6b35,#e63946);color:#fff;font-size:15px;font-weight:bold;letter-spacing:2px;cursor:pointer;transition:all .3s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(230,57,70,0.3)}
.rl{text-align:center;margin-top:18px}
.rl a{color:rgba(255,255,255,0.4);text-decoration:none;font-size:12px;cursor:pointer}
.rl a:hover{color:#457bff}
.rl a em{color:#ff6b35;font-style:normal}
.showcase{position:relative;z-index:22;width:100%;max-width:1100px;margin:60px auto 0;padding:0 20px}
.showcase-header{text-align:center;margin-bottom:40px}
.showcase-header h2{font-size:22px;font-weight:800;letter-spacing:2px;background:linear-gradient(135deg,#fff,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.showcase-header p{color:rgba(255,255,255,0.35);font-size:12px;margin-top:6px;letter-spacing:3px;text-transform:uppercase}
.showcase-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.prod-card{position:relative;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:20px;overflow:hidden;cursor:pointer;transition:all .5s cubic-bezier(0.34,1.56,0.64,1);opacity:0;transform:translateY(40px) scale(0.9)}
.prod-card.visible{opacity:1;transform:translateY(0) scale(1)}
.prod-card:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);transform:translateY(-6px) scale(1.02);box-shadow:0 20px 50px rgba(0,0,0,0.4)}
.prod-card .glow{position:absolute;top:-40%;left:-40%;width:180%;height:180%;border-radius:50%;opacity:0.08;transition:opacity .5s;pointer-events:none}
.prod-card:hover .glow{opacity:0.2}
.prod-card .img-wrap{width:100%;height:110px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;position:relative;z-index:1}
.prod-card .img-wrap img{max-width:100%;max-height:100%;object-fit:contain;filter:drop-shadow(0 6px 20px rgba(0,0,0,0.5));transition:transform .5s cubic-bezier(0.34,1.56,0.64,1)}
.prod-card:hover .img-wrap img{transform:scale(1.12)}
.prod-card .info{position:relative;z-index:1}
.prod-card .info .name{font-size:15px;font-weight:700;letter-spacing:1px;margin-bottom:4px}
.prod-card .info .badge{display:inline-block;font-size:10px;padding:2px 10px;border-radius:20px;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.4);letter-spacing:1px;margin-top:6px}
.prod-card .info .desc{font-size:11px;color:rgba(255,255,255,0.3);margin-top:8px;line-height:1.5}
.prod-modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;background:rgba(0,0,0,0.7);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center}
.prod-modal-overlay.open{display:flex}
.prod-modal{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:40px;max-width:520px;width:90%;position:relative;animation:modalIn .4s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes modalIn{0%{opacity:0;transform:scale(0.85) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.prod-modal .close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,0.08);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
.prod-modal .close:hover{background:rgba(255,107,53,0.3);transform:rotate(90deg)}
.prod-modal .modal-img{width:100%;height:200px;display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.prod-modal .modal-img img{max-width:100%;max-height:100%;object-fit:contain;filter:drop-shadow(0 10px 30px rgba(0,0,0,0.5))}
.prod-modal h2{font-size:24px;font-weight:900;letter-spacing:2px;margin-bottom:6px}
.prod-modal .modal-desc{color:rgba(255,255,255,0.45);font-size:13px;line-height:1.7;margin-bottom:16px}
.prod-modal .modal-specs{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.prod-modal .modal-specs .spec{background:rgba(255,255,255,0.04);border-radius:10px;padding:10px 14px}
.prod-modal .modal-specs .spec .label{font-size:10px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.prod-modal .modal-specs .spec .value{font-size:13px;font-weight:600}
.entry-switcher{display:flex;gap:12px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.entry-switcher a{display:flex;align-items:center;gap:8px;padding:10px 22px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);text-decoration:none;font-size:13px;font-weight:600;letter-spacing:1px;transition:all .3s;cursor:pointer}
.entry-switcher a:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);color:#fff;transform:translateY(-2px)}
.entry-switcher .admin-btn:hover{border-color:#ff6b35;color:#ff6b35}
.entry-switcher .owner-btn:hover{border-color:#00b894;color:#00b894}
@media(max-width:768px){
.hd{padding:16px 20px}
.hd nav{display:none}
.lw{width:100%}
.lc{padding:28px 20px}
.showcase-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.prod-card{padding:14px}
.prod-card .img-wrap{height:80px}
.prod-card .info .name{font-size:13px}
.showcase-header h2{font-size:18px}
.main-wrap{padding:80px 12px 120px}
.entry-switcher a{font-size:12px;padding:8px 16px}
}
</style>
</head>
<body>
<div class="st"></div>
<div class="bg"></div>
<div class="am"><div></div><div></div><div></div></div>
<div class="gl"></div>
<canvas id="pc"></canvas>
<canvas id="gc"></canvas>
<div class="pz" id="pz"></div>
<div class="hd">
  <div class="lg"><span class="lt">UWELL</span></div>
  <nav>
    <a href="#" onclick="document.getElementById('un').focus();return false">粉丝登录</a>
    <a href="#" onclick="document.querySelector('.prod-card').scrollIntoView({behavior:'smooth'});return false">产品展示</a>
    <a href="#" id="headerOwner">店主进入</a>
    <a href="#" id="headerAdmin">管理员</a>
  </nav>
</div>
<div class="main-wrap">
  <div class="lw">
    <div class="lc">
      <div class="bar"></div>
      <div class="lt">
        <h1>UWELL FAN CLUB</h1>
        <p>加入会员 · 签到积分 · 兑换好礼</p>
      </div>
      <div class="fg">
        <label>邮箱</label>
        <input type="email" id="un" placeholder="Enter your email">
      </div>
      <div class="fg">
        <label>密码</label>
        <input type="password" id="pw" placeholder="Enter your password">
      </div>
      <div class="fo">
        <label><input type="checkbox" checked> 记住我</label>
        <a href="#">忘记密码?</a>
      </div>
      <button class="btn" id="loginBtn">登 录</button>
      <div class="rl">
        <a href="#">还没有账号？<em>立即加入</em></a>
      </div>
    </div>
    <div class="entry-switcher">
      <a class="owner-btn" id="ownerEntry"><span>🏪</span> 店主进入</a>
      <a class="admin-btn" id="adminEntry"><span>🔒</span> 管理员</a>
    </div>
  </div>
  <div class="showcase" id="showcase">
    <div class="showcase-header">
      <h2>✦ UWELL 产品家族 ✦</h2>
      <p>探索我们的明星产品</p>
    </div>
    <div class="showcase-grid" id="productGrid"></div>
  </div>
</div>
<div class="prod-modal-overlay" id="prodModal">
  <div class="prod-modal">
    <button class="close" id="modalClose">✕</button>
    <div class="modal-img"><img id="modalImg" src="" alt=""></div>
    <h2 id="modalTitle"></h2>
    <div class="modal-desc" id="modalDesc"></div>
    <div class="modal-specs" id="modalSpecs"></div>
  </div>
</div>
<script>
var PD=[{n:"CALIBURN AIR",c:"#ff6b35",i:"https://files.myuwell.com/uwell/ow-home-banner/AIR%20PC%20banner%20%203840-1620-20260616092816517.jpg"},{n:"CALIBURN G5",c:"#457bff",i:"https://files.myuwell.com/uwell/ow-home-banner/G5-banner-3840-1620-20260421160504521.jpg"},{n:"G5 KOKO",c:"#6c5ce7",i:"https://files.myuwell.com/uwell/ow-home-banner/G5%20KOKO-BANNER-3840x1620-20260108144156453.png"},{n:"G5 LITE SE",c:"#00b894",i:"https://files.myuwell.com/uwell/ow-home-banner/G5%20Lite%20%26%20Lite%20SE-BANNER-3840x1620-20251210144711254.png"},{n:"G5 LITE KOKO",c:"#fd79a8",i:"https://files.myuwell.com/uwell/ow-home-banner/G5-Lite-KOKO-banner-3840-1620-20251210135848829.jpg"},{n:"Caliburn",c:"#e17055",i:"https://files.myuwell.com/uwell/ow-product-ip/caliburn-20240627113220107.webp"},{n:"Crown",c:"#fdcb6e",i:"https://files.myuwell.com/uwell/ow-product-ip/CROWN-20240627113158744.webp"},{n:"Havok",c:"#00cec9",i:"https://files.myuwell.com/uwell/ow-product-ip/havok-20240522105356154.png"},{n:"200-X100",c:"#a29bfe",i:"https://files.myuwell.com/uwell/ow-product-ip/200-X100-20251024143003969.png"},{n:"E-MLOCK2",c:"#ffeaa7",i:"https://files.myuwell.com/uwell/ow-product-ip/E-MLOCK2-20250106151611228.png"},{n:"IP3",c:"#fab1a0",i:"https://files.myuwell.com/uwell/ow-product-ip/ip3-20240523142405908.png"},{n:"IP2",c:"#81ecec",i:"https://files.myuwell.com/uwell/ow-product-ip/ip2-20240523142323960.png"}];
var PROD_INFO = {
  "CALIBURN AIR":{desc:"极致纤薄的气流感应电子烟，专为追求便携与口感的用户打造。极速响应、不漏油、零按键操作。",specs:[["型号","CALIBURN AIR"],["烟弹容量","2.0ml"],["电池","400mAh"],["材质","锌合金+PC"]],icon:"⚡"},
  "CALIBURN G5":{desc:"UWELL 第五代 CALIBURN 旗舰系列，融合创新网芯技术与人体工学设计，带来层次丰富的口感体验。",specs:[["型号","CALIBURN G5"],["烟弹容量","2.5ml"],["电池","520mAh"],["输出功率","15-25W"]],icon:"🔥"},
  "G5 KOKO":{desc:"G5 家族紧凑版本，保留旗舰口感的同时更加小巧便携。多彩配色，随时随地展现个性。",specs:[["型号","G5 KOKO"],["烟弹容量","2.0ml"],["电池","450mAh"],["材质","航空铝"]],icon:"💜"},
  "G5 LITE SE":{desc:"G5 Lite SE 入门级优选，继承 G5 核心科技，价格更亲民。适合首次尝试电子烟的用户。",specs:[["型号","G5 LITE SE"],["烟弹容量","2.0ml"],["电池","380mAh"],["特色","性价比之选"]],icon:"🌿"},
  "G5 LITE KOKO":{desc:"时尚紧凑的轻量级选择，兼具 G5 系列口感特点。女性用户首选，轻巧随行。",specs:[["型号","G5 LITE KOKO"],["烟弹容量","1.8ml"],["电池","350mAh"],["配色","5种可选"]],icon:"🌸"},
  "Caliburn":{desc:"UWELL 经典传奇之作，开创 CALIBURN 时代。全球销量领先的开放式电子烟，经久不衰。",specs:[["型号","Caliburn OG"],["烟弹容量","2.0ml"],["电池","520mAh"],["线圈","1.4Ω"]],icon:"🏆"},
  "Crown":{desc:"王者之作，Crown 系列为追求极致大烟雾与浓郁口感的进阶玩家打造。",specs:[["型号","Crown"],["功率","60-80W"],["烟油容量","3.5ml"],["线圈","0.2/0.4Ω"]],icon:"👑"},
  "Havok":{desc:"Havok 系列颠覆性设计，未来感造型搭配澎湃性能。大烟雾爱好者的不二之选。",specs:[["型号","Havok"],["功率","80-100W"],["烟油容量","4.0ml"],["特色","可调气流"]],icon:"💥"},
  "200-X100":{desc:"专业级大烟雾主机，双电 200W 输出。配备智能温控系统，满足高阶玩家的所有需求。",specs:[["型号","200-X100"],["功率","5-200W"],["电池","双18650"],["芯片","智能温控"]],icon:"🚀"},
  "E-MLOCK2":{desc:"智能电子锁系统，专为未成年保护设计。为零售商和家长提供安心保障。",specs:[["型号","E-MLOCK2"],["类型","智能锁"],["兼容","多系列"],["认证","CE/RoHS"]],icon:"🔐"},
  "IP3":{desc:"IP3 系列三防设计（防水/防尘/防摔），适合户外场景和严苛环境使用。",specs:[["型号","IP3"],["防护","IP67"],["电池","内置2000mAh"],["特色","三防机身"]],icon:"🛡️"},
  "IP2":{desc:"IP2 系列经典三防机型，可靠耐用。军工级防护标准，全天候无忧使用。",specs:[["型号","IP2"],["防护","IP65"],["电池","内置1500mAh"],["适用","全天候"]],icon:"💪"}
};
(function(){
  var grid = document.getElementById('productGrid');
  PD.forEach(function(p, idx){
    var info = PROD_INFO[p.n] || {desc:"UWELL 优质产品",specs:[["品牌","UWELL"],["系列",p.n]],icon:"✨"};
    var card = document.createElement('div');
    card.className = 'prod-card';
    card.style.transitionDelay = (idx * 0.06) + 's';
    card.innerHTML = '<div class="glow" style="background:radial-gradient(circle,'+p.c+',transparent)"></div><div class="img-wrap"><img src="'+p.i+'" alt="'+p.n+'" loading="lazy" onerror="this.style.display=\'none\'"></div><div class="info"><div class="name" style="color:'+p.c+'">'+info.icon+' '+p.n+'</div><span class="badge" style="border-color:'+p.c+'33;color:'+p.c+'99">NEW</span><div class="desc">'+info.desc.substring(0,40)+'…</div></div>';
    card.addEventListener('click',function(){openModal(p,info);});
    grid.appendChild(card);
  });
  setTimeout(function(){
    var cards = document.querySelectorAll('.prod-card');
    cards.forEach(function(c,i){
      setTimeout(function(){c.classList.add('visible');}, i * 100);
    });
  }, 800);
})();
function openModal(p, info){
  document.getElementById('modalImg').src = p.i;
  document.getElementById('modalTitle').textContent = info.icon + ' ' + p.n;
  document.getElementById('modalTitle').style.color = p.c;
  document.getElementById('modalDesc').textContent = info.desc;
  var specsHtml = '';
  info.specs.forEach(function(s){ specsHtml += '<div class="spec"><div class="label">'+s[0]+'</div><div class="value">'+s[1]+'</div></div>'; });
  document.getElementById('modalSpecs').innerHTML = specsHtml;
  document.getElementById('prodModal').classList.add('open');
}
document.getElementById('modalClose').addEventListener('click',function(){document.getElementById('prodModal').classList.remove('open');});
document.getElementById('prodModal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
document.getElementById('ownerEntry').addEventListener('click',function(){alert('店主入口即将开放，敬请期待！');});
document.getElementById('adminEntry').addEventListener('click',function(){window.location.href='/admin';});
