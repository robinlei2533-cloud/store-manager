<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0f" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0a0a0f; color: #e5e5e5; }
      
      /* ===== Liquid-Glass Design System ===== */
      .liquid-glass {
        background: rgba(255,255,255,0.03);
        background-blend-mode: luminosity;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: none;
        box-shadow: inset 0 1px 1px rgba(255,215,0,0.08);
        position: relative;
        overflow: hidden;
      }
      .liquid-glass::before {
        content: "";
        position: absolute; inset: 0;
        border-radius: inherit;
        padding: 1.2px;
        background: linear-gradient(180deg, rgba(255,215,0,0.3) 0%, rgba(255,215,0,0.1) 20%, transparent 40%, transparent 60%, rgba(255,215,0,0.1) 80%, rgba(255,215,0,0.3) 100%);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }
      .liquid-glass-strong {
        background: rgba(255,255,255,0.04);
        background-blend-mode: luminosity;
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        box-shadow: 0 4px 24px rgba(0,0,0,0.12);
        position: relative;
        overflow: hidden;
      }
      .liquid-glass-strong::before {
        content: "";
        position: absolute; inset: 0;
        border-radius: inherit;
        padding: 1.2px;
        background: linear-gradient(180deg, rgba(255,215,0,0.4) 0%, rgba(255,215,0,0.15) 20%, transparent 40%, transparent 60%, rgba(255,215,0,0.15) 80%, rgba(255,215,0,0.4) 100%);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }
      .glass-card {
        background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      }
      .gold-glow {
        box-shadow: 0 0 20px rgba(255,215,0,0.08), 0 0 60px rgba(255,215,0,0.04);
      }
      .gold-text {
        background: linear-gradient(135deg, #FFD700 0%, #F5A623 50%, #D4A800 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: 0.01ms !important; }
      }
    </style>
    <title>UWELL CRM — Growth Operations Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
