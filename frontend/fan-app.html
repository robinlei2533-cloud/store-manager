<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>UWELL · 粉丝俱乐部</title>
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0a0a0f; color: #e5e5e5; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
      #root { min-height: 100vh; }
      .loading-screen { display: flex; justify-content: center; align-items: center; height: 100vh; background: #0a0a0f; flex-direction: column; gap: 16px; }
      .loading-spinner { width: 36px; height: 36px; border: 3px solid #2a2a35; border-top-color: #FFD700; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      
      /* ===== Liquid-Glass Design System ===== */
      .liquid-glass {
        background: rgba(255,255,255,0.03);
        background-blend-mode: luminosity;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: none;
        box-shadow: inset 0 1px 1px rgba(255,215,0,0.08);
        position: relative;
        overflow: hidden;
      }
      .liquid-glass::before {
        content: "";
        position: absolute; inset: 0;
        border-radius: inherit;
        padding: 1.2px;
        background: linear-gradient(180deg, rgba(255,215,0,0.3) 0%, rgba(255,215,0,0.1) 20%, transparent 40%, transparent 60%, rgba(255,215,0,0.1) 80%, rgba(255,215,0,0.3) 100%);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }
      .liquid-glass-strong {
        background: rgba(255,255,255,0.04);
        background-blend-mode: luminosity;
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        box-shadow: 0 4px 24px rgba(0,0,0,0.12);
        position: relative;
        overflow: hidden;
      }
      .liquid-glass-strong::before {
        content: "";
        position: absolute; inset: 0;
        border-radius: inherit;
        padding: 1.2px;
        background: linear-gradient(180deg, rgba(255,215,0,0.4) 0%, rgba(255,215,0,0.15) 20%, transparent 40%, transparent 60%, rgba(255,215,0,0.15) 80%, rgba(255,215,0,0.4) 100%);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }
      .font-heading { font-family: 'Instrument Serif', serif; font-style: italic; }
      .font-body { font-family: 'Barlow', sans-serif; }

      @media (max-width: 768px) {
        html { font-size: 14px; }
        .ant-table { font-size: 12px !important; }
        .ant-tabs-tab { padding: 8px 12px !important; font-size: 12px !important; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
      }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.2); border-radius: 2px; }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-screen">
        <div class="loading-spinner"></div>
        <span style="color:#888;font-size:14px;">UWELL · 加载中...</span>
      </div>
    </div>
    <script type="module" src="./src/fan/main.jsx"></script>
  </body>
</html>
