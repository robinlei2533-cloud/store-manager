<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>UWELL · 粉丝中心</title>
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0a0a0f; color: #e5e5e5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
      #root { min-height: 100vh; }
      .loading-screen { display: flex; justify-content: center; align-items: center; height: 100vh; background: #0a0a0f; flex-direction: column; gap: 16px; }
      .loading-spinner { width: 36px; height: 36px; border: 3px solid #2a2a35; border-top-color: #FFD700; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
          /* ===== Mobile Responsive ===== */
      @media (max-width: 768px) {
        html { font-size: 14px; }
        .ant-table { font-size: 12px !important; }
        .ant-card { border-radius: 10px !important; }
        .ant-tabs-tab { padding: 8px 12px !important; font-size: 12px !important; }
        .ant-statistic-title { font-size: 11px !important; }
        .ant-statistic-content { font-size: 18px !important; }
        .ant-table-thead > tr > th,
        .ant-table-tbody > tr > td { padding: 6px 8px !important; }
        .mobile-full { width: 100% !important; }
        .mobile-hide { display: none !important; }
        .mobile-stack { flex-direction: column !important; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
      }
      @media (max-width: 480px) {
        html { font-size: 12px; }
        .ant-col { padding: 4px !important; }
        .ant-row { margin: -4px !important; }
        .ant-card-body { padding: 10px !important; }
        .ant-modal { max-width: 95vw !important; margin: 0 auto !important; }
        .ant-drawer-content-wrapper { width: 100% !important; }
      }
      /* Scrollbar styling */
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.2); border-radius: 2px; }</style>
  </head>
  <body>
    <div id="root">
      <div class="loading-screen">
        <div class="loading-spinner"></div>
        <span style="color:#888;font-size:14px;">UWELL · 加载中...</span>
      </div>
    </div>
    <script type="module" src="./src/fan/main.jsx"></script>
  </body>
</html>
