<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>UWELL · 粉丝中心</title>
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0a0a0f; color: #e5e5e5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
      #root { min-height: 100vh; }
      .loading-screen { display: flex; justify-content: center; align-items: center; height: 100vh; background: #0a0a0f; flex-direction: column; gap: 16px; }
      .loading-spinner { width: 36px; height: 36px; border: 3px solid #2a2a35; border-top-color: #FFD700; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-screen">
        <div class="loading-spinner"></div>
        <span style="color:#888;font-size:14px;">UWELL · 加载中...</span>
      </div>
    </div>
    <script type="module" src="./src/fan/main.jsx"></script>
  </body>
</html>
